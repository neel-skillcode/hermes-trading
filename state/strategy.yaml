version: "02"

entry:
  indicators:
    rsi:
      period: 14
      oversold: 45      # loosened: was 30 — now catches real dips not just crashes
      overbought: 62    # loosened: was 70 — catches momentum tops earlier
    macd:
      fast: 12
      slow: 26
      signal: 9
    momentum:
      lookback_days: 5
      min_pct: 0.005    # 0.5% move threshold (was 2% hardcoded — far too strict)
  min_signal_confluence: 1   # 1 strong signal is enough to enter
  min_confidence: 0.20       # was hardcoded 0.30 — MACD alone gives 0.25
  news_sentiment_weight: 0.35

universe_selection:
  max_candidates: 5
  min_momentum_score: 0.3
  min_volume_percentile: 60
  forex_weight: 0.4
  equity_weight: 0.6

position_sizing:
  method: kelly_fractional
  kelly_fraction: 0.25
  max_position_pct: 0.20

stop_loss:
  base_atr_multiplier: 2.0
  confidence_scale: true

take_profit:
  base_rr_ratio: 2.5
  news_boost_max: 0.5

regime_detection:
  method: rolling_return_classifier
  lookback_days: 20
